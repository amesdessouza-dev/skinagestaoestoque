<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Skina</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:20px;
}

input, button{
  padding:10px;
  margin:5px;
}

button{
  background:#ff6600;
  border:none;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Cadastro de Produto</h2>

<input id="nome" placeholder="Nome do produto">
<input id="categoria" placeholder="Categoria">

<button onclick="salvarProduto()">Salvar Produto</button>

<h3>Produtos:</h3>
<ul id="lista"></ul>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYvncR1nVNEQhRiQFnLPaBXeJoFzKs2ag",
  authDomain: "skina-estoque.firebaseapp.com",
  projectId: "skina-estoque",
  storageBucket: "skina-estoque.firebasestorage.app",
  messagingSenderId: "1066634889476",
  appId: "1:1066634889476:web:36b58cd087cc2292d62851"
};

// iniciar firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// SALVAR PRODUTO
function salvarProduto(){
  const nome = document.getElementById('nome').value;
  const categoria = document.getElementById('categoria').value;

  if(!nome){
    alert("Digite o nome");
    return;
  }

  const produto = {
    nome: nome,
    categoria: categoria,
    criadoEm: new Date()
  };

  db.collection("produtos").add(produto)
    .then(() => {
      alert("Salvo no Firebase!");
      carregarProdutos();
    })
    .catch((error) => {
      console.error("Erro:", error);
    });
}


// CARREGAR PRODUTOS
function carregarProdutos(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  db.collection("produtos").get()
    .then((querySnapshot) => {
      querySnapshot.forEach((doc) => {
        const item = doc.data();
        const li = document.createElement("li");
        li.textContent = item.nome + " - " + item.categoria;
        lista.appendChild(li);
      });
    });
}

// carregar ao abrir
carregarProdutos();

</script>

</body>
</html>
